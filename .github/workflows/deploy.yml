name: Deploy Porra Tour to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: porra-tour
        run: npm install

      - name: Build
        working-directory: porra-tour
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: porra-tour/dist
          publish_branch: gh-pages
          force_orphan: true

